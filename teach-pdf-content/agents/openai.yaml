interface:
  display_name: "Teach PDF Content"
  short_description: "Turn supplied PDFs or course readings into chapter-managed, source-grounded study packs."
  default_prompt: "Use $teach-pdf-content to teach the specified PDF chapter or course reading, split long sources into chapter packs, then create source-grounded notes with concrete examples, mastery standards, recall questions with final answer keys, exercises with complete answers, glossary, memory cards, code extracts, study time tables, and a review plan."
