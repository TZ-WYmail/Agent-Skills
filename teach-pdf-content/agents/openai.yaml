interface:
  display_name: "Teach PDF Content"
  short_description: "Turn supplied PDFs or course readings into knowledge-point-oriented, source-grounded chapter packs with three learner-facing files and quality gates."
  default_prompt: "Use $teach-pdf-content to teach the specified PDF chapter or course reading. Route through the needed subskill modules for source intake, detailed-notes, practice, review-notes, quality gate, and CS/data-structure content when relevant; split long sources into chapter packs; extract knowledge points before drafting prose; assign concept complexity; build knowledge-map.json first; prepare a short internal page brief for each target knowledge point (learner doubt, best entry point, minimum example, must-teach why-it-holds segment, likely confusion, closed-book output); generate knowledge-pages.json as the primary page-level teaching source; for each knowledge page, define a teaching contract first (`page_kind`, `teaching_profile`, `clarity_risk`, `must_answer`, `exit_outcomes`, `failure_signals`) and only then write the page blocks; do not let C1/C2 collapse into lazy minimum-template explanations; upgrade teaching depth whenever the learner could still reasonably ask why it works or how it differs from nearby concepts; treat high-value C3/C4 points as 10-15 minute micro-lessons; compile detailed-notes.md from those pages; then generate practice.md, review-notes.md, source-map.md, and _meta.json; include starter examples, why-it-holds explanations, traces, boundaries, closed-book retell templates, answer-key separation, oral review routes, and wrong-answer recovery; run the vNext lesson-pack checker before reporting completion."
