interface:
  display_name: "Teach PDF Content"
  short_description: "Turn supplied PDFs or course readings into knowledge-point-oriented, source-grounded chapter packs with three learner-facing files and quality gates."
  default_prompt: "Use $teach-pdf-content to teach the specified PDF chapter or course reading. Route through the needed subskill modules for source intake, detailed-notes, practice, review-notes, quality gate, and CS/data-structure content when relevant; split long sources into chapter packs; extract knowledge points before drafting prose; assign concept complexity; generate detailed-notes.md, practice.md, review-notes.md, knowledge-map.json, source-map.md, and _meta.json; include starter examples, why-it-holds explanations, traces, boundaries, closed-book retell templates, answer-key separation, oral review routes, and wrong-answer recovery; run the vNext lesson-pack checker before reporting completion."
